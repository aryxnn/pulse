services:
  - type: web
    name: pulse-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: REDIS_URL
        sync: false
      - key: DATABASE_URL
        sync: false
